<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Cetățenie România</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #002B7F;
      --yellow: #FCD116;
      --red: #CE1126;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
      --transition: 0.25s ease;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      width: 100%;
      background: var(--blue);
      color: #fff;
      padding: 24px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blue) 33.33%, var(--yellow) 33.33%, var(--yellow) 66.66%, var(--red) 66.66%);
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 0.875rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* Main container */
    .container {
      width: 100%;
      max-width: 640px;
      padding: 24px 16px 40px;
      flex: 1;
    }

    /* Progress bar */
    .progress-section {
      margin-bottom: 20px;
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), #0047d4);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Category pills */
    .category-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .cat-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      transition: all var(--transition);
      cursor: default;
    }
    .cat-pill.active {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }
    .cat-pill .pill-count {
      margin-left: 4px;
      opacity: 0.7;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all var(--transition);
    }
    .card-body {
      padding: 28px 24px;
    }

    /* Welcome state */
    .welcome {
      text-align: center;
      padding: 48px 24px;
    }
    .welcome-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .welcome h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Question display */
    .question-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--blue);
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.55;
      color: var(--text);
    }

    /* Answer display */
    .answer-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px dashed var(--border);
      display: none;
    }
    .answer-section.visible { display: block; }
    .answer-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #059669;
      margin-bottom: 10px;
    }
    .answer-text {
      font-size: 0.95rem;
      line-height: 1.65;
      color: #374151;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      flex: 1;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--blue);
      color: #fff;
    }
    .btn-primary:hover { background: #001f5c; }
    .btn-secondary {
      background: #f3f4f6;
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-reveal {
      background: #ecfdf5;
      color: #059669;
      border: 1.5px solid #a7f3d0;
    }
    .btn-reveal:hover { background: #d1fae5; }
    .btn-reset {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
    }
    .btn-reset:hover { background: #f9fafb; color: var(--red); border-color: var(--red); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .bottom-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    /* Completion state */
    .completion {
      text-align: center;
      padding: 48px 24px;
    }
    .completion-icon { font-size: 3rem; margin-bottom: 16px; }
    .completion h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    .completion p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 24px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Dark theme */
    [data-theme="dark"] {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #e5e5e5;
      --text-muted: #9ca3af;
      --border: #2d2d44;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    [data-theme="dark"] .answer-text { color: #d1d5db; }
    [data-theme="dark"] .btn-secondary { background: #252540; color: var(--text); border-color: var(--border); }
    [data-theme="dark"] .btn-secondary:hover { background: #2d2d44; }
    [data-theme="dark"] .btn-reveal { background: #064e3b; color: #6ee7b7; border-color: #065f46; }
    [data-theme="dark"] .btn-reveal:hover { background: #065f46; }
    [data-theme="dark"] .btn-reset:hover { background: #1a1a2e; }

    /* Header controls */
    .header-controls {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
    }
    .header-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-btn:hover { background: rgba(255,255,255,0.25); }

    /* Category pill filtering */
    .cat-pill { cursor: pointer; user-select: none; }
    .cat-pill:hover { border-color: var(--blue); }
    .cat-pill.disabled { opacity: 0.4; text-decoration: line-through; }
    .cat-pill.disabled:hover { border-color: var(--border); }

    /* Responsive */
    @media (max-width: 480px) {
      .header h1 { font-size: 1.25rem; }
      .card-body { padding: 20px 16px; }
      .question-text { font-size: 1.05rem; }
      .actions { flex-direction: column; }
      .bottom-actions { flex-direction: column; }
      .category-bar { gap: 6px; }
      .header-controls { right: 12px; }
      .header-btn { width: 32px; height: 32px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1 id="header-title">Quiz Cetățenie România</h1>
  <p id="header-subtitle">Pregătire pentru examenul de cetățenie</p>
  <div class="header-controls">
    <button class="header-btn" id="lang-btn" onclick="toggleLang()" title="Switch language">EN</button>
    <button class="header-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme"></button>
  </div>
</div>

<div class="container">
  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-stats">
      <span id="progress-text">0 / 0 întrebări</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Category pills -->
  <div class="category-bar" id="category-bar"></div>

  <!-- Main card -->
  <div class="card" id="main-card">
    <div class="card-body" id="card-body">
      <div class="loading" id="loading-state">
        <div class="spinner"></div>
        <p id="loading-text">Se încarcă întrebările...</p>
      </div>
    </div>
  </div>

  <!-- Bottom actions (shown after quiz starts) -->
  <div class="bottom-actions" id="bottom-actions" style="display:none;">
    <button class="btn btn-reset" onclick="resetQuiz()">Resetează</button>
  </div>
</div>

<script>
// ========== TRANSLATIONS ==========
const translations = {
  ro: {
    title: "Quiz Cetățenie România",
    subtitle: "Pregătire pentru examenul de cetățenie",
    loading: "Se încarcă întrebările...",
    loadError: "Eroare la încărcare",
    loadErrorMsg: "Nu s-a putut încărca biblioteca PapaParse.",
    csvError: "Eroare",
    csvErrorMsg: "Nu s-au putut încărca întrebările. Verificați fișierul questions.csv.",
    welcome: "Bine ați venit!",
    welcomeMsg: "Testați-vă cunoștințele pentru examenul de cetățenie română.",
    questionsFrom: "întrebări din 4 categorii.",
    startQuiz: "Începe Quiz-ul",
    continueQuiz: "Continuă",
    startFresh: "Începe de la zero",
    showAnswer: "Arată Răspunsul",
    next: "Următoarea",
    reset: "Resetează",
    answer: "Răspuns",
    congrats: "Felicitări!",
    completedMsg: "Ați parcurs toate cele",
    questions: "întrebări",
    questionsLabel: "întrebări",
    startAgain: "Începe din nou",
    categories: {
      Constitution: "Constituție",
      History: "Istorie",
      Culture: "Cultură",
      Geography: "Geografie"
    }
  },
  en: {
    title: "Romanian Citizenship Quiz",
    subtitle: "Citizenship exam preparation",
    loading: "Loading questions...",
    loadError: "Loading Error",
    loadErrorMsg: "Could not load the PapaParse library.",
    csvError: "Error",
    csvErrorMsg: "Could not load questions. Check the questions.csv file.",
    welcome: "Welcome!",
    welcomeMsg: "Test your knowledge for the Romanian citizenship exam.",
    questionsFrom: "questions from 4 categories.",
    startQuiz: "Start Quiz",
    continueQuiz: "Continue",
    startFresh: "Start Fresh",
    showAnswer: "Show Answer",
    next: "Next",
    reset: "Reset",
    answer: "Answer",
    congrats: "Congratulations!",
    completedMsg: "You have completed all",
    questions: "questions",
    questionsLabel: "questions",
    startAgain: "Start Again",
    categories: {
      Constitution: "Constitution",
      History: "History",
      Culture: "Culture",
      Geography: "Geography"
    }
  }
};

// ========== STATE ==========
let currentLang = localStorage.getItem('quizLang') || 'ro';
let currentTheme = localStorage.getItem('quizTheme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
let enabledCategories = JSON.parse(localStorage.getItem('quizCategories')) || null;

// Translation helper
function t(key) {
  return translations[currentLang][key] || key;
}
function tCat(cat) {
  return translations[currentLang].categories[cat] || cat;
}

// ========== THEME ==========
function initTheme() {
  document.documentElement.dataset.theme = currentTheme;
  updateThemeBtn();
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('quizTheme', currentTheme);
  document.documentElement.dataset.theme = currentTheme;
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('theme-btn').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
}

// ========== LANGUAGE ==========
function toggleLang() {
  currentLang = currentLang === 'ro' ? 'en' : 'ro';
  localStorage.setItem('quizLang', currentLang);
  updateLangBtn();
  updateUI();
}
function updateLangBtn() {
  document.getElementById('lang-btn').textContent = currentLang === 'ro' ? 'EN' : 'RO';
}
function updateUI() {
  document.getElementById('header-title').textContent = t('title');
  document.getElementById('header-subtitle').textContent = t('subtitle');
  document.querySelector('.btn-reset').textContent = t('reset');
  updateProgress();
  // Re-render current view if quiz loaded
  if (allQuestionsLoaded) {
    if (currentQuestion) {
      renderCurrentQuestion();
    } else if (Object.keys(usedQuestions).length === 0) {
      showWelcome();
    }
  }
}

// ========== PROGRESS PERSISTENCE ==========
function saveProgress() {
  localStorage.setItem('quizProgress', JSON.stringify(usedQuestions));
  localStorage.setItem('quizCategories', JSON.stringify(enabledCategories));
}
function loadProgress() {
  const saved = localStorage.getItem('quizProgress');
  return saved ? JSON.parse(saved) : {};
}
function hasSavedProgress() {
  const saved = loadProgress();
  return Object.keys(saved).length > 0;
}
function clearProgress() {
  localStorage.removeItem('quizProgress');
  usedQuestions = {};
}

// Use PapaParse for CSV parsing
function loadScript(src, cb) {
    let s = document.createElement('script');
    s.src = src;
    s.onload = cb;
    s.onerror = function() {
        document.getElementById('card-body').innerHTML =
            '<div class="welcome"><div class="welcome-icon">⚠️</div><h2>' + t('loadError') + '</h2>' +
            '<p>' + t('loadErrorMsg') + '</p></div>';
    };
    document.head.appendChild(s);
}

// Init theme and language buttons immediately
initTheme();
updateLangBtn();
// Update loading text based on language
document.getElementById('loading-text').textContent = t('loading');

loadScript('https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js', function() { initQuiz(); });

let questionsByCategory = {}, usedQuestions = {}, currentQuestion = null, currentCat = null;
let allQuestionsLoaded = false;
let categories = ["Constitution", "History", "Culture", "Geography"];
let totalQuestions = 0;

function initQuiz() {
    fetch('questions.csv')
      .then(res => {
          if (!res.ok) throw new Error('CSV not found');
          return res.text();
      })
      .then(csvText => {
          const data = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;
          questionsByCategory = {};
          categories.forEach(cat => questionsByCategory[cat] = []);
          data.forEach((row, i) => {
              let cat = row.Category ? row.Category.trim() : '';
              if (categories.includes(cat) && row.Question && row.Question.trim() && row.Answer && row.Answer.trim())
                  questionsByCategory[cat].push({id: i, question: row.Question.trim(), answer: row.Answer.trim()});
          });
          // Initialize enabled categories if not set
          if (!enabledCategories) {
              enabledCategories = [...categories];
          }
          updateTotalQuestions();
          allQuestionsLoaded = true;
          // Load saved progress
          usedQuestions = loadProgress();
          renderCategoryPills();
          updateProgress();
          showWelcome();
      })
      .catch(err => {
          document.getElementById('card-body').innerHTML =
              '<div class="welcome"><div class="welcome-icon">⚠️</div><h2>' + t('csvError') + '</h2>' +
              '<p>' + t('csvErrorMsg') + '</p></div>';
      });
}

function updateTotalQuestions() {
    totalQuestions = enabledCategories.reduce((sum, cat) => sum + questionsByCategory[cat].length, 0);
}

function showWelcome() {
    let hasProgress = hasSavedProgress() && Object.keys(usedQuestions).length > 0;
    let answeredCount = Object.keys(usedQuestions).length;
    let buttons = '';

    if (hasProgress) {
        buttons = '<button class="btn btn-primary" onclick="nextQuestion()" style="width:100%; margin-bottom:10px">' + t('continueQuiz') + ' (' + answeredCount + '/' + totalQuestions + ')</button>' +
                  '<button class="btn btn-secondary" onclick="clearProgress(); resetQuiz(); showWelcome();" style="width:100%">' + t('startFresh') + '</button>';
    } else {
        buttons = '<button class="btn btn-primary" onclick="nextQuestion()" style="width:100%">' + t('startQuiz') + '</button>';
    }

    document.getElementById('card-body').innerHTML =
        '<div class="welcome fade-in">' +
        '<div class="welcome-icon">🇷🇴</div>' +
        '<h2>' + t('welcome') + '</h2>' +
        '<p>' + t('welcomeMsg') + ' ' + totalQuestions + ' ' + t('questionsFrom') + '</p>' +
        buttons +
        '</div>';
    document.getElementById('bottom-actions').style.display = 'none';
}

function renderCategoryPills() {
    let bar = document.getElementById('category-bar');
    bar.innerHTML = categories.map(cat => {
        let isEnabled = enabledCategories.includes(cat);
        let remaining = unusedQuestions(cat).length;
        let total = questionsByCategory[cat].length;
        let disabledClass = isEnabled ? '' : ' disabled';
        return '<div class="cat-pill' + disabledClass + '" id="pill-' + cat + '" onclick="toggleCategory(\'' + cat + '\')">' +
               tCat(cat) +
               '<span class="pill-count">' + remaining + '/' + total + '</span></div>';
    }).join('');
}

function toggleCategory(cat) {
    if (enabledCategories.includes(cat)) {
        // Don't allow disabling all categories
        if (enabledCategories.length <= 1) return;
        enabledCategories = enabledCategories.filter(c => c !== cat);
    } else {
        enabledCategories.push(cat);
    }
    updateTotalQuestions();
    saveProgress();
    renderCategoryPills();
    updateProgress();
    // If on welcome screen, re-render to update question count
    if (!currentQuestion && Object.keys(usedQuestions).length === 0) {
        showWelcome();
    }
}

function updateProgress() {
    // Only count answered questions from enabled categories
    let answered = Object.keys(usedQuestions).filter(id => {
        for (let cat of enabledCategories) {
            if (questionsByCategory[cat] && questionsByCategory[cat].some(q => q.id == id)) return true;
        }
        return false;
    }).length;
    let pct = totalQuestions > 0 ? Math.round((answered / totalQuestions) * 100) : 0;
    document.getElementById('progress-text').textContent = answered + ' / ' + totalQuestions + ' ' + t('questionsLabel');
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    renderCategoryPills();
    // Update active pill
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    if (currentCat) {
        let pill = document.getElementById('pill-' + currentCat);
        if (pill) pill.classList.add('active');
    }
}

function nextQuestion() {
    if (!allQuestionsLoaded) return;

    // Only consider enabled categories
    let remaining = enabledCategories.filter(cat => unusedQuestions(cat).length > 0);
    if (remaining.length === 0) {
        showCompletion();
        return;
    }

    let cat = remaining[Math.floor(Math.random() * remaining.length)];
    let unused = unusedQuestions(cat);
    let q = unused[Math.floor(Math.random() * unused.length)];
    usedQuestions[q.id] = true;
    saveProgress();

    currentQuestion = q;
    currentCat = cat;

    renderCurrentQuestion();
    document.getElementById('bottom-actions').style.display = 'flex';
    updateProgress();
}

function renderCurrentQuestion() {
    if (!currentQuestion || !currentCat) return;
    document.getElementById('card-body').innerHTML =
        '<div class="fade-in">' +
        '<div class="question-label">' + tCat(currentCat) + '</div>' +
        '<div class="question-text">' + escapeHtml(currentQuestion.question) + '</div>' +
        '<div class="answer-section" id="answer-section">' +
        '<div class="answer-label">' + t('answer') + '</div>' +
        '<div class="answer-text" id="answer-text"></div>' +
        '</div>' +
        '<div class="actions">' +
        '<button class="btn btn-reveal" id="btn-reveal" onclick="showAnswer()">' + t('showAnswer') + '</button>' +
        '<button class="btn btn-primary" onclick="nextQuestion()">' + t('next') + '</button>' +
        '</div>' +
        '</div>';
}

function unusedQuestions(cat) {
    return questionsByCategory[cat].filter(q => !usedQuestions[q.id]);
}

function showAnswer() {
    if (!currentQuestion) return;
    let section = document.getElementById('answer-section');
    let text = document.getElementById('answer-text');
    let btn = document.getElementById('btn-reveal');
    if (section && text) {
        text.textContent = currentQuestion.answer;
        section.classList.add('visible');
        section.classList.add('fade-in');
    }
    if (btn) btn.style.display = 'none';
}

function showCompletion() {
    currentQuestion = null;
    currentCat = null;
    document.getElementById('card-body').innerHTML =
        '<div class="completion fade-in">' +
        '<div class="completion-icon">🎉</div>' +
        '<h2>' + t('congrats') + '</h2>' +
        '<p>' + t('completedMsg') + ' ' + totalQuestions + ' ' + t('questions') + '.</p>' +
        '<button class="btn btn-primary" onclick="resetQuiz(); showWelcome();" style="width:100%">' + t('startAgain') + '</button>' +
        '</div>';
    updateProgress();
}

function resetQuiz() {
    clearProgress();
    currentQuestion = null;
    currentCat = null;
    updateProgress();
    showWelcome();
}

function escapeHtml(text) {
    let div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
</body>
</html>
